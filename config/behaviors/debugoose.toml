# Debugoose Behavior Config
# Debug overlay with state info

[settings]
# Maximum log entries
maxLogs = 10

# Debug box width
boxWidth = 300.0

# Debug box height (0 = calculated from maxLogs)
boxHeight = 0.0

# Horizontal position
positionX = 10.0

# Vertical position
positionY = 10.0

# Font name
fontName = "Courier"

# Font size
fontSize = 12.0

[bgColor]
r = 0.1
g = 0.1
b = 0.1
a = 0.8

[textColor]
r = 0.0
g = 1.0
b = 0.0
