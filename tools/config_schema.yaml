# CadGoose Config Schema
# Single source of truth for config registry and GUI generation.
# Run: python3 tools/generate_config.py config_schema.yaml
#
# Types: bool, int, float, string
# Sections map to GUI tabs/categories.

sections:
  Debug:
    fields:
      - name: toTerminal
        type: bool
        key: to_terminal
        label: "To Terminal"
      - name: visuals
        type: bool
        key: visuals
        label: "Visuals"

  General:
    fields:
      - name: globalScale
        type: float
        key: global_scale
        label: "Global Scale"
        min: 0.0
        max: 10.0
        step: 0.1
        explanation: "Multiplier for goose size and speeds (0.1 - 10.0)"
      - name: audioEnabled
        type: bool
        key: audio_enabled
        label: "Audio Enabled"
        explanation: "Play honk sounds when goose moves"
      - name: audioMuted
        type: bool
        key: audio_muted
        label: "Audio Muted"
      - name: memesEnabled
        type: bool
        key: memes_enabled
        label: "Memes Enabled"
        explanation: "Allow picking up images and text as items"
      - name: appearanceMode
        type: int
        key: appearance_mode
        label: "Appearance Mode"
        min: 0
        max: 3
        explanation: "0=Light, 1=Dark, 2=System (follow macOS), 3=Custom"
      - name: lightThemeRole
        type: string
        key: light_theme_role
        label: "Light Theme Role"
      - name: darkThemeRole
        type: string
        key: dark_theme_role
        label: "Dark Theme Role"
      - name: failsafeHotkey
        type: string
        key: failsafe_hotkey
        label: "Failsafe Hotkey"

  Screen:
    fields:
      - name: defaultWidth
        type: int
        key: default_width
        label: "Default Width"
        min: 0
        max: 10000
      - name: defaultHeight
        type: int
        key: default_height
        label: "Default Height"
        min: 0
        max: 10000

