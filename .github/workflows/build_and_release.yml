name: Build & Release Artifacts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  # ── macOS ──────────────────────────────────────────────
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake googletest mimalloc

      - name: Configure & Build
        run: |
          rm -rf build && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -j$(sysctl -n hw.logicalcpu)

      - name: Create App Bundle
        run: |
          chmod +x scripts/create_bundle.sh
          ./scripts/create_bundle.sh --clean

      - name: Create DMG
        if: hashFiles('build/CadGoose.app') != ''
        run: |
          hdiutil create -volname CadGoose -srcfolder build/CadGoose.app -ov -format UDZO build/CadGoose.dmg

      - name: Upload DMG (artifact)
        if: hashFiles('build/CadGoose.dmg') != ''
        uses: actions/upload-artifact@v4
        with:
          name: CadGoose-macOS
          path: build/CadGoose.dmg
          retention-days: 30

      - name: Publish DMG (release only)
        if: github.event_name == 'release' && hashFiles('build/CadGoose.dmg') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/CadGoose.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux ──────────────────────────────────────────────
  build-linux:
    name: Build Linux (tar.zst)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libgtk-4-dev libsdl2-dev libsdl2-mixer-dev \
            libgdk-pixbuf-2.0-dev libwayland-dev libx11-dev libxtst-dev zstd

      - name: Configure & Build
        run: |
          rm -rf build && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel $(nproc)

      # Tests are macOS-only (behaviors have CoreGraphics dependencies)

      - name: Package binary
        run: |
          mkdir -p cadgoose-linux/{bin,config,Assets}
          cp build/CadGoose cadgoose-linux/bin/
          cp -r config/* cadgoose-linux/config/ 2>/dev/null || true
          cp -r Assets/* cadgoose-linux/Assets/ 2>/dev/null || true
          tar --zstd -cf CadGoose-linux.tar.zst cadgoose-linux

      - name: Upload tar.zst (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CadGoose-Linux
          path: CadGoose-linux.tar.zst
          retention-days: 30

      - name: Publish tar.zst (release only)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: CadGoose-linux.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
