# NOTE: This workflow is a template. The app is NOT currently built on GitHub.
# The bundled .app crashes on macOS 26.5+ with "MTLCompilerService unavailable".
# Non-bundled ./build/CadGoose binary works fine. CI runs locally.
# PR builds are checked by pr_check.yml.

name: Build and Release CadGoose macOS Bundle

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build-macos-bundle:
    name: Build macOS Bundle
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake googletest

      - name: Build
        run: |
          rm -rf build
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -j$(sysctl -n hw.logicalcpu)

      - name: Create App Bundle
        run: |
          chmod +x scripts/create_bundle.sh
          ./scripts/create_bundle.sh --clean 2>/dev/null || echo "Bundle creation skipped (expected on systems without proper signing)"

      - name: Verify Bundle
        run: |
          if [ -f build/CadGoose.app/Contents/MacOS/CadGoose ]; then
            ls -la build/CadGoose.app/Contents/MacOS/
            ls -la build/CadGoose.app/Contents/Resources/
            file build/CadGoose.app/Contents/MacOS/CadGoose
          else
            echo "Bundle not created (non-fatal)"
          fi

      - name: Package Bundle as ZIP
        if: ${{ hashFiles('build/CadGoose.app') != '' }}
        run: |
          cd build
          zip -r CadGoose.zip CadGoose.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && hashFiles('build/CadGoose.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/CadGoose.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && hashFiles('build/CadGoose.zip') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: CadGoose-macOS-bundle
          path: build/CadGoose.zip
          retention-days: 30